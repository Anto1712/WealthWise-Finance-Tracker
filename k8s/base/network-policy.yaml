apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: wealthwise
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: wealthwise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wealthwise-web
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress-mongodb
  namespace: wealthwise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-api
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 27017
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: wealthwise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-egress-api
  namespace: wealthwise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wealthwise-web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: wealthwise-api
      ports:
        - protocol: TCP
          port: 4000
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
